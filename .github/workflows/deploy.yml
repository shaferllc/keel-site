name: Deploy

# The site used to go out only when someone ran `npm run deploy` on their laptop,
# so it lagged the framework: keel shipped 0.79.0 and keeljs.com still said 0.78.2.
# Now a push deploys, and a release deploys.
on:
  push:
    branches: [main]
  # The site follows the framework on its own: it asks npm what the latest version
  # is and bumps to it. No cross-repo credential — the alternative was a PAT living
  # in keel's Actions forever just to announce "a version shipped."
  schedule:
    - cron: "*/30 * * * *"
  # keel's release workflow can also push the news, for an immediate deploy rather
  # than waiting for the next poll. Optional: the schedule covers it either way.
  repository_dispatch:
    types: [keel-released]
  workflow_dispatch:

concurrency:
  # A newer deploy supersedes an older one — never race two wrangler uploads.
  group: deploy
  cancel-in-progress: false

jobs:
  # Decide what (if anything) to deploy, so a poll that finds nothing new costs
  # ~15s and doesn't churn the Worker.
  check:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: decide
        env:
          EVENT: ${{ github.event_name }}
          DISPATCHED: ${{ github.event.client_payload.version }}
        run: |
          # The version the site is currently pinned to ("^0.79.0" -> "0.79.0").
          installed="$(node -p "require('./package.json').dependencies['@shaferllc/keel'].replace(/^\D+/, '')")"

          case "$EVENT" in
            repository_dispatch) target="$DISPATCHED" ;;
            schedule)            target="$(npm view @shaferllc/keel version)" ;;
            *)                   target="$installed" ;;  # a push: deploy the site as it stands
          esac

          echo "installed=${installed} target=${target}"

          # A poll that finds nothing new is not a deploy.
          if [ "$EVENT" = "schedule" ] && [ "$target" = "$installed" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "nothing new on npm"
            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"
          echo "version=${target}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: check
    if: needs.check.outputs.deploy == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write # to commit the version bump when it follows a release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Move to the released version. The caret can't do this for us: for a 0.x
      # version, ^0.79.0 means ">=0.79.0 <0.80.0" — every minor needs an explicit
      # bump, which is exactly the step a human kept forgetting.
      - name: Follow the released version
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          npm install "@shaferllc/keel@${VERSION}" --save

          if git diff --quiet -- package.json package-lock.json; then
            echo "already on ${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Site: keel ${VERSION}" -- package.json package-lock.json
          # A push authenticated with GITHUB_TOKEN does not re-trigger `on: push`,
          # so this cannot loop back into another deploy.
          git push

      # Renders the guides out of the installed package and bakes them into the
      # Worker — this is where the version in the header comes from too.
      - name: Build docs
        run: npm run docs

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploying is not the same as being live. Assert the version the site
      # actually serves, against the workers.dev origin — the custom domain sits
      # behind Cloudflare's edge cache and has reported stale content before.
      - name: The deployed site serves the version we built
        run: |
          expected="$(node -p "require('@shaferllc/keel/package.json').version")"
          for i in $(seq 1 10); do
            served="$(curl -sL "https://keel-site.flat-thunder-531a.workers.dev/?cb=${i}${RANDOM}" \
              | grep -oE '0\.[0-9]+\.[0-9]+' | head -1)"
            if [ "$served" = "$expected" ]; then
              echo "live: ${served}"
              exit 0
            fi
            echo "serving '${served}', want '${expected}' — retrying"
            sleep 6
          done
          echo "::error::site still serving '${served}' after deploy (want ${expected})"
          exit 1
